# Secret template — fill in base64-encoded values before applying.
# Generate a base64 value: echo -n "your-value" | base64
#
# Do NOT commit this file with real values.
# Use a secrets manager (AWS Secrets Manager, Vault, Sealed Secrets) in production.
apiVersion: v1
kind: Secret
metadata:
  name: agentspan-secrets
  namespace: agentspan
type: Opaque
stringData:
  # ── Encryption ──────────────────────────────────────────────────────────────
  # Master key for credential encryption (AES-256-GCM, base64-encoded 32 bytes)
  # Generate with: openssl rand -base64 32
  AGENTSPAN_MASTER_KEY: ""

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  POSTGRES_USER: "agentspan"
  POSTGRES_PASSWORD: "changeme"          # ← CHANGE THIS

  # ── LLM Provider Keys (add whichever you use) ───────────────────────────────
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  MISTRAL_API_KEY: ""
  COHERE_API_KEY: ""
  XAI_API_KEY: ""
  PERPLEXITY_API_KEY: ""
  HUGGINGFACE_API_KEY: ""
  STABILITY_API_KEY: ""

  # ── Azure OpenAI (optional) ──────────────────────────────────────────────────
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_DEPLOYMENT: ""

  # ── AWS Bedrock (optional) ───────────────────────────────────────────────────
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"

  # ── Google Vertex AI (optional) ──────────────────────────────────────────────
  GOOGLE_CLOUD_PROJECT: ""
  GOOGLE_CLOUD_LOCATION: "us-central1"
