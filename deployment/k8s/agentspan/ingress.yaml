# ── Ingress (nginx ingress controller) ───────────────────────────────────────
#
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#
# After applying, get the external IP:
#   kubectl get svc -n ingress-nginx ingress-nginx-controller
#
# For TLS (recommended), install cert-manager and uncomment the TLS section:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# All traffic → agentspan-server:6767
#   The server JAR includes the built UI served from / (Spring Boot static resources).
#   API routes (/api, /swagger-ui, /api-docs) are handled by the same server.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentspan
  namespace: agentspan
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # Uncomment for cert-manager automatic TLS:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
    - host: agentspan.example.com   # ← CHANGE to your domain (or remove for IP access)
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentspan-server
                port:
                  number: 6767
  # ── TLS (uncomment when cert-manager is set up) ───────────────────────────
  # tls:
  #   - hosts:
  #       - agentspan.example.com
  #     secretName: agentspan-tls
