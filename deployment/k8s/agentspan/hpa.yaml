# ── Horizontal Pod Autoscaler for the server ─────────────────────────────────
# Scales between 3 and 10 replicas based on CPU usage.
# Requires metrics-server:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentspan-server-hpa
  namespace: agentspan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentspan-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
