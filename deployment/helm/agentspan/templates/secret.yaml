{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentspan.secretName" . }}
  labels:
    {{- include "agentspan.labels" . | nindent 4 }}
type: Opaque
stringData:
  AGENTSPAN_MASTER_KEY: {{ .Values.secrets.masterKey | quote }}

  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}

  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  MISTRAL_API_KEY: {{ .Values.secrets.mistralApiKey | quote }}
  COHERE_API_KEY: {{ .Values.secrets.cohereApiKey | quote }}
  XAI_API_KEY: {{ .Values.secrets.xaiApiKey | quote }}
  PERPLEXITY_API_KEY: {{ .Values.secrets.perplexityApiKey | quote }}
  HUGGINGFACE_API_KEY: {{ .Values.secrets.huggingfaceApiKey | quote }}
  STABILITY_API_KEY: {{ .Values.secrets.stabilityApiKey | quote }}

  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secrets.azureOpenaiEndpoint | quote }}
  AZURE_OPENAI_DEPLOYMENT: {{ .Values.secrets.azureOpenaiDeployment | quote }}

  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  AWS_REGION: {{ .Values.secrets.awsRegion | quote }}

  GOOGLE_CLOUD_PROJECT: {{ .Values.secrets.googleCloudProject | quote }}
  GOOGLE_CLOUD_LOCATION: {{ .Values.secrets.googleCloudLocation | quote }}
{{- end }}
