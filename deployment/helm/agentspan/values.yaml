nameOverride: ""
fullnameOverride: ""

replicaCount: 3

image:
  repository: agentspan/server
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

terminationGracePeriodSeconds: 30

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
  hosts:
    - host: agentspan.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

config:
  springProfilesActive: postgres
  javaOpts: "-Xms512m -Xmx1536m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
  loggingLevelRoot: WARN
  loggingLevelAgentspan: INFO
  ollamaHost: ""

# Use exactly one of:
# - postgres.enabled=true (bundled DB)
# - externalDatabase.enabled=true (external DB)
postgres:
  enabled: true
  database: agentspan
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  terminationGracePeriodSeconds: 60
  persistence:
    # true: StatefulSet PVC (durable), false: emptyDir (ephemeral pod storage)
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    storageClass: ""

externalDatabase:
  enabled: false
  host: ""
  port: 5432
  database: agentspan

secrets:
  # If set, chart will reference this existing secret and will not create one.
  # Expected keys: POSTGRES_USER, POSTGRES_PASSWORD, provider API key names below.
  existingSecret: ""
  create: true

  postgresUser: agentspan
  postgresPassword: changeme

  anthropicApiKey: ""
  openaiApiKey: ""
  geminiApiKey: ""
  mistralApiKey: ""
  cohereApiKey: ""
  xaiApiKey: ""
  perplexityApiKey: ""
  huggingfaceApiKey: ""
  stabilityApiKey: ""

  azureOpenaiApiKey: ""
  azureOpenaiEndpoint: ""
  azureOpenaiDeployment: ""

  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  awsRegion: us-east-1

  googleCloudProject: ""
  googleCloudLocation: us-central1

tests:
  enabled: true
  image:
    repository: curlimages/curl
    tag: 8.12.1
    pullPolicy: IfNotPresent
