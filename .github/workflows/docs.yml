name: Docs

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "serve-docs.sh"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "serve-docs.sh"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-source-docs:
    name: Build source docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

  build-website-docs:
    name: Build docs with website renderer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout agentspan
        uses: actions/checkout@v4
        with:
          path: agentspan

      - name: Checkout agentspan-site
        uses: actions/checkout@v4
        with:
          repository: agentspan-ai/agentspan-site
          path: agentspan-site

      - name: Detect website docs sync support
        id: renderer
        run: |
          if [ -f agentspan-site/scripts/sync-docs-from-agentspan.mjs ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping website renderer check until agentspan-site has scripts/sync-docs-from-agentspan.mjs on its default branch."
          fi

      - name: Set up Node
        if: steps.renderer.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agentspan-site/package-lock.json

      - name: Install website dependencies
        if: steps.renderer.outputs.available == 'true'
        working-directory: agentspan-site
        run: npm ci

      - name: Sync docs from agentspan source
        if: steps.renderer.outputs.available == 'true'
        working-directory: agentspan-site
        env:
          AGENTSPAN_DOCS_SOURCE: ../agentspan/docs
        run: npm run sync:docs

      - name: Build website with source docs
        if: steps.renderer.outputs.available == 'true'
        working-directory: agentspan-site
        run: npm run build
