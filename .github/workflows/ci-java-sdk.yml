name: CI Java SDK

on:
  pull_request:
    paths:
      - 'sdk/java/**'
  push:
    branches:
      - main
    paths:
      - 'sdk/java/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: mvn test
