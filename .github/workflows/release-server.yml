name: Release Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Prepare release asset
        run: |
          cp build/libs/agentspan-runtime.jar ../agentspan-server-${{ inputs.version }}.jar

      - name: Upload to S3 (versioned and latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          VERSION="${{ inputs.version }}"
          aws s3 cp ../agentspan-server-${VERSION}.jar \
            s3://agentspan/agentspan-server-${VERSION}.jar
          aws s3 cp ../agentspan-server-${VERSION}.jar \
            s3://agentspan/agentspan-server-latest.jar
