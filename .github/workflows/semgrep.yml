name: Semgrep

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.156.0

      - name: Run Semgrep
        id: semgrep
        env:
          SEMGREP_SEND_METRICS: off
        run: |
          set +e
          semgrep scan \
            --config p/default \
            --error \
            --disable-version-check \
            --baseline-commit "${{ github.event.pull_request.base.sha }}" \
            --json \
            --output semgrep.json \
            .
          status=$?
          if [ -f semgrep.json ]; then
            findings=$(jq '.results | length' semgrep.json)
          else
            findings=0
            echo '{"results":[]}' > semgrep.json
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "findings=$findings" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build Semgrep report
        if: always()
        run: |
          changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD | wc -l | tr -d ' ')
          findings="${{ steps.semgrep.outputs.findings }}"

          {
            echo "## Semgrep Results"
            echo ""
            echo "- Findings in changed files: $findings"
            echo "- Changed files in pull request: $changed_files"
            echo "- Baseline commit: \`${{ github.event.pull_request.base.sha }}\`"
            if [ "${{ steps.semgrep.outputs.exit_code }}" = "0" ]; then
              echo "- Status: no blocking findings"
            else
              echo "- Status: blocking findings detected"
            fi
            echo ""

            if [ "$findings" -gt 0 ]; then
              echo "### Findings"
              jq -r --arg repo "${{ github.repository }}" --arg sha "${{ github.event.pull_request.head.sha }}" '
                .results[:10][] |
                "- [`\(.path):\(.start.line)`](https://github.com/\($repo)/blob/\($sha)/\(.path)#L\(.start.line)) - **\(.check_id)**: \(.extra.message // "Semgrep finding")"
              ' semgrep.json

              if [ "$findings" -gt 10 ]; then
                echo ""
                echo "_Showing first 10 findings. Full report is attached as \`semgrep-results\`._"
              fi
            else
              echo "No Semgrep findings were introduced in the files changed by this pull request."
            fi
          } > semgrep-comment.md

          cat semgrep-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: always()
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: semgrep
          path: semgrep-comment.md
          skip_unchanged: true

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: semgrep-results
          path: semgrep.json

      - name: Enforce findings
        if: always()
        run: exit "${{ steps.semgrep.outputs.exit_code }}"
