name: Semgrep

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.156.0

      - name: Run Semgrep
        id: semgrep
        env:
          SEMGREP_SEND_METRICS: off
        run: |
          set +e
          semgrep scan \
            --config p/default \
            --error \
            --disable-version-check \
            --baseline-commit "${{ github.event.pull_request.base.sha }}" \
            --json \
            --output semgrep.json \
            .
          status=$?
          findings=$(jq '.results | length' semgrep.json)
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "findings=$findings" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize results
        if: always()
        run: |
          {
            echo "## Semgrep Results"
            echo ""
            echo "- Findings: ${{ steps.semgrep.outputs.findings }}"
            echo "- Baseline commit: \`${{ github.event.pull_request.base.sha }}\`"
            echo "- Report artifact: \`semgrep-results\`"
            if [ "${{ steps.semgrep.outputs.exit_code }}" = "0" ]; then
              echo "- Status: no blocking findings"
            else
              echo "- Status: blocking findings detected"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: semgrep-results
          path: semgrep.json

      - name: Enforce findings
        if: always()
        run: exit "${{ steps.semgrep.outputs.exit_code }}"
