name: Release CLI - npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.0.10)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: cli

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update package.json version
        run: |
          VERSION="${{ inputs.version }}"
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --provenance --access public
