name: OSV-Scanner

on:
  push:
    branches:
      - main
  schedule:
    - cron: '47 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Vulnerability Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      # Scan the canonical lockfiles to avoid duplicate findings from stale secondary lockfiles.
      scan-args: |-
        --lockfile=./package-lock.json
        --lockfile=./ui/pnpm-lock.yaml
        --lockfile=./sdk/python/uv.lock
        --lockfile=./sdk/typescript/package-lock.json
        --lockfile=./cli/go.mod
      # Keep the baseline visible in Security > Code scanning without blocking all pushes to main.
      fail-on-vuln: false
