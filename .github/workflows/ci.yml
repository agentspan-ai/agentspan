name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Java Server Tests ──────────────────────────────────────────────
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - name: Run server tests
        run: ./gradlew build

  # ── Go CLI Tests ─────────────────────────────────────────────────
  cli-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
      - name: Run CLI tests
        run: go test ./... -count=1 -race

  # ── Python SDK Unit Tests ──────────────────────────────────────────
  python-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --extra dev --group dev
      - name: Run unit tests
        run: uv run pytest tests/unit/ -q --tb=short

  # ── TypeScript SDK Unit Tests ──────────────────────────────────────
  typescript-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run unit tests
        run: npx vitest run tests/unit/

  # ── Build Server JAR (shared by e2e jobs) ──────────────────────────
  build-server:
    runs-on: ubuntu-latest
    needs: [server-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate
      - name: Build server JAR with UI
        working-directory: server
        run: ./gradlew bootJar -PbuildUI=true -x test
      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/agentspan-runtime.jar
          retention-days: 1

  # ── Python E2E Tests ───────────────────────────────────────────────
  python-e2e:
    runs-on: ubuntu-latest
    needs: [build-server, python-unit-tests]
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AGENTSPAN_SERVER_URL: http://localhost:6767/api
      AGENTSPAN_CLI_PATH: ../../cli/agentspan
      AGENTSPAN_MASTER_KEY: "MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA="
      AGENTSPAN_AUTO_START_SERVER: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
      - uses: astral-sh/setup-uv@v6

      - name: Download server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/

      - name: Build CLI
        working-directory: cli
        run: go build -o agentspan .

      - name: Install Python SDK + testing deps
        working-directory: sdk/python
        run: uv sync --extra dev --extra testing --group dev

      - name: Install mcp-testkit
        working-directory: sdk/python
        run: uv pip install mcp-testkit

      - name: Start mcp-testkit
        run: |
          mcp-testkit --transport http --port 3001 &
          sleep 2

      - name: Start server
        run: |
          java -jar server/build/libs/agentspan-runtime.jar --server.port=6767 &
          for i in $(seq 1 30); do curl -sf http://localhost:6767/health && break; sleep 2; done

      - name: Run Python e2e tests (existing)
        working-directory: sdk/python
        run: uv run pytest ../../tests/e2e/test_python_e2e.py -n auto -v

      - name: Run Python e2e suites 1-9
        working-directory: sdk/python
        run: |
          uv run pytest e2e/ -v --tb=short \
            --junitxml=../../e2e-results/junit.xml \
            -n 1

      - name: Generate Python HTML report
        if: always()
        working-directory: sdk/python
        run: uv run python e2e/report_generator.py ../../e2e-results/junit.xml ../../e2e-results/report.html

      - name: Upload Python e2e results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-e2e-results
          path: e2e-results/
          retention-days: 14

  # ── TypeScript E2E Tests ───────────────────────────────────────────
  typescript-e2e:
    runs-on: ubuntu-latest
    needs: [build-server, typescript-unit-tests]
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AGENTSPAN_SERVER_URL: http://localhost:6767/api
      AGENTSPAN_CLI_PATH: ../../cli/agentspan
      AGENTSPAN_MASTER_KEY: "MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA="
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: astral-sh/setup-uv@v6

      - name: Download server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/

      - name: Build CLI
        working-directory: cli
        run: go build -o agentspan .

      - name: Install mcp-testkit
        run: pip install mcp-testkit

      - name: Start mcp-testkit
        run: |
          mcp-testkit --transport http --port 3001 &
          sleep 2

      - name: Start server
        run: |
          java -jar server/build/libs/agentspan-runtime.jar --server.port=6767 &
          for i in $(seq 1 30); do curl -sf http://localhost:6767/health && break; sleep 2; done

      - name: Install TypeScript SDK
        working-directory: sdk/typescript
        run: npm ci && npm run build

      - name: Run TypeScript e2e tests (existing)
        working-directory: sdk/typescript
        run: npx vitest run ../../tests/e2e/typescript_e2e.test.ts --pool=threads

      - name: Run TypeScript e2e suites 1-9
        working-directory: sdk/typescript
        run: npx vitest run tests/e2e/ --reporter=verbose --reporter=junit --outputFile.junit=../../e2e-results/junit-ts.xml

      - name: Generate TypeScript HTML report
        if: always()
        working-directory: sdk/typescript
        run: npx tsx tests/e2e/generate-report.ts ../../e2e-results/junit-ts.xml ../../e2e-results/report-ts.html

      - name: Upload TypeScript e2e results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-e2e-results
          path: e2e-results/
          retention-days: 14
