name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Java Server Tests ──────────────────────────────────────────────
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - name: Run server tests
        run: ./gradlew test

  # ── Python SDK Unit Tests ──────────────────────────────────────────
  python-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run unit tests
        run: uv run pytest tests/unit/ -q --tb=short

  # ── TypeScript SDK Unit Tests ──────────────────────────────────────
  typescript-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run unit tests
        run: npx vitest run tests/unit/

  # ── Cross-SDK E2E Tests ────────────────────────────────────────────
  # E2E tests require a running server + LLM API keys.
  # Runs on main merges only (not PRs) to avoid burning API credits.
  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [server-tests, python-unit-tests, typescript-unit-tests]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      # Java for server
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # Python for Python SDK e2e
      - uses: astral-sh/setup-uv@v6

      # Node for TypeScript SDK e2e
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build and start server
      - name: Build server
        working-directory: server
        run: ./gradlew shadowJar -x test
      - name: Start server
        working-directory: server
        run: |
          java -jar build/libs/agentspan-runtime-shaded.jar &
          sleep 15
          curl -sf http://localhost:8080/health || (echo "Server failed to start" && exit 1)

      # Python e2e
      - name: Install Python SDK
        working-directory: sdk/python
        run: uv sync --extra dev
      - name: Run Python e2e tests
        working-directory: sdk/python
        run: uv run pytest ../../tests/e2e/test_python_e2e.py -v -s
        env:
          AGENTSPAN_SERVER_URL: http://localhost:8080/api

      # TypeScript e2e
      - name: Install TypeScript SDK
        working-directory: sdk/typescript
        run: npm ci && npm run build
      - name: Run TypeScript e2e tests
        working-directory: sdk/typescript
        run: npx vitest run ../../tests/e2e/typescript_e2e.test.ts
        env:
          AGENTSPAN_SERVER_URL: http://localhost:8080/api
