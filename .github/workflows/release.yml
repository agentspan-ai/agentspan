name: Release

on:
  release:
    types: [created]

permissions:
  contents: write
  id-token: write

jobs:
  # ── Build phase (all run in parallel) ──────────────────────────────────

  build-server:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-')
    defaults:
      run:
        working-directory: server
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare release asset
        run: |
          cp build/libs/agentspan-runtime.jar ../agentspan-server-${{ steps.version.outputs.version }}.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: agentspan-server-${{ steps.version.outputs.version }}.jar
          retention-days: 1

  build-cli:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-')
    defaults:
      run:
        working-directory: cli
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build binaries for all platforms
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="${GITHUB_SHA}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X github.com/agentspan/agentspan/cli/cmd.Version=${VERSION} -X github.com/agentspan/agentspan/cli/cmd.Commit=${COMMIT} -X github.com/agentspan/agentspan/cli/cmd.Date=${DATE}"

          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_linux_amd64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_linux_arm64
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_darwin_amd64
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_darwin_arm64
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_windows_amd64.exe
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_windows_arm64.exe

          chmod +x dist/agentspan_*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: cli/dist/
          retention-days: 1

  build-python-sdk:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-')
    defaults:
      run:
        working-directory: sdk/python
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: sdk/python/dist/
          retention-days: 1

  # ── Deploy phase (gated on ALL builds succeeding) ──────────────────────

  deploy-server:
    runs-on: ubuntu-latest
    needs: [build-server, build-cli, build-python-sdk]
    steps:
      - name: Download server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar

      - name: Upload JAR to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.build-server.outputs.tag }}" \
            agentspan-server-${{ needs.build-server.outputs.version }}.jar \
            --repo "${{ github.repository }}"

      - name: Upload to S3 (versioned and latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          VERSION="${{ needs.build-server.outputs.version }}"
          aws s3 cp agentspan-server-${VERSION}.jar \
            s3://agentspan/agentspan-server-${VERSION}.jar
          aws s3 cp agentspan-server-${VERSION}.jar \
            s3://agentspan/agentspan-server-latest.jar

  deploy-cli-release:
    runs-on: ubuntu-latest
    needs: [build-server, build-cli, build-python-sdk]
    steps:
      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist

      - name: Upload CLI binaries to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.build-cli.outputs.tag }}" \
            dist/agentspan_linux_amd64 \
            dist/agentspan_linux_arm64 \
            dist/agentspan_darwin_amd64 \
            dist/agentspan_darwin_arm64 \
            dist/agentspan_windows_amd64.exe \
            dist/agentspan_windows_arm64.exe \
            --repo "${{ github.repository }}"

      - name: Upload CLI binaries to S3 (versioned and latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          VERSION="${{ needs.build-cli.outputs.version }}"
          for binary in dist/agentspan_*; do
            filename=$(basename "$binary")
            aws s3 cp "$binary" "s3://agentspan/cli/${VERSION}/${filename}"
            aws s3 cp "$binary" "s3://agentspan/cli/latest/${filename}"
          done

  deploy-cli-npm:
    needs: [build-server, build-cli, build-python-sdk]
    uses: ./.github/workflows/release-cli-npm.yml
    with:
      version: ${{ needs.build-cli.outputs.version }}
    secrets: inherit

  deploy-cli-homebrew:
    needs: [build-server, build-cli, build-python-sdk, deploy-cli-release]
    uses: ./.github/workflows/release-cli-homebrew.yml
    with:
      version: ${{ needs.build-cli.outputs.version }}
      tag: ${{ needs.build-cli.outputs.tag }}
    secrets: inherit

  deploy-python-sdk:
    runs-on: ubuntu-latest
    needs: [build-server, build-cli, build-python-sdk]
    environment: pypi
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
