name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.10). Defaults to latest release tag."
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ── Determine version ────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.release.tag_name, 'v') && !contains(github.event.release.tag_name, '-'))
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

  # ── Server ───────────────────────────────────────────────────────
  server-s3:
    needs: [prepare]
    uses: ./.github/workflows/release-server-s3.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  server-docker:
    needs: [prepare]
    uses: ./.github/workflows/release-server-docker.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ── CLI ──────────────────────────────────────────────────────────
  cli-github:
    needs: [prepare]
    uses: ./.github/workflows/release-cli-github.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  cli-npm:
    needs: [prepare]
    uses: ./.github/workflows/release-cli-npm.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  cli-homebrew:
    needs: [prepare, cli-github]
    uses: ./.github/workflows/release-cli-homebrew.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  # ── SDKs ─────────────────────────────────────────────────────────
  python-sdk:
    needs: [prepare]
    uses: ./.github/workflows/release-python-sdk.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  js-sdk:
    needs: [prepare]
    uses: ./.github/workflows/release-js-sdk.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit
