name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      tag: ${{ steps.get_version.outputs.TAG }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ inputs.version }}"
          TAG="cli-v${VERSION}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#cli-v}"
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "TAG=${TAG}" >> $GITHUB_OUTPUT

    - name: Build binaries for all platforms
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        COMMIT="${GITHUB_SHA}"
        DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        LDFLAGS="-X github.com/agentspan/agentspan/cli/cmd.Version=${VERSION} -X github.com/agentspan/agentspan/cli/cmd.Commit=${COMMIT} -X github.com/agentspan/agentspan/cli/cmd.Date=${DATE}"

        mkdir -p dist

        GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_linux_amd64
        GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_linux_arm64
        GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_darwin_amd64
        GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_darwin_arm64
        GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/agentspan_windows_amd64.exe
        GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/agentspan_windows_arm64.exe

        chmod +x dist/agentspan_*

    - name: Generate changelog
      id: changelog
      run: |
        PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi

        echo "$CHANGELOG" > CHANGELOG.txt
        cat CHANGELOG.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        body_path: cli/CHANGELOG.txt
        files: |
          cli/dist/agentspan_linux_amd64
          cli/dist/agentspan_linux_arm64
          cli/dist/agentspan_darwin_amd64
          cli/dist/agentspan_darwin_arm64
          cli/dist/agentspan_windows_amd64.exe
          cli/dist/agentspan_windows_arm64.exe
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    uses: ./.github/workflows/release-cli-npm.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  publish-homebrew:
    needs: release
    if: "!contains(needs.release.outputs.version, '-')"
    uses: ./.github/workflows/release-cli-homebrew.yml
    with:
      version: ${{ needs.release.outputs.version }}
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
